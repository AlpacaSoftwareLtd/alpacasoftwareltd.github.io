en: &DEFAULT_EN
  header:
    title:
    text: "Great software,<br><em>best practices.</em>"
    subtitle: "We build clean, tested, maintainable software for startups and growing companies. Based in London."
    button: What we do
    buttonlink: "#services"

  services:
    title: "Services"
    text: ""
    section: services
    list:
      - title: "MVP"
        desc: >
          From your business idea to a deployed service. We design and build a first iteration with core functionality ready for user testing.
        icon: fas fa-rocket

      - title: "Web Applications"
        desc: >
          From mockups to full-fledged web applications. New features, migrations, or a ground-up build — we're comfortable with the full lifecycle.
        icon: far fa-window-maximize

      - title: "Automation"
        desc: >
          Automate business and development processes. Test suites, CI/CD pipelines, scheduled tasks, internal tooling — all of it.
        icon: fas fa-robot

  stack:
    section: stack
    label: "Expertise"
    title: "Our Focus"
    intro: "We combine a decade of experience with a production-hardened toolset to build reliable, high-performance systems."
    columns:
      - title: "Architecture"
        items:
          - Microservices
          - Real-time applications
          - Security-sensitive systems
          - Application Interfaces (APIs)
          - UX/DX driven and responsive design
      - title: "Methodologies"
        items:
          - Maintainable software
          - Layered testing; TDD, BDD, e2e, CI/CD
          - Code reviews and pair programming
          - Continuous delivery and automation
          - Documentation
      - title: "Core Stack"
        items:
          - Linux
          - Google Cloud
          - Python / Django / FastAPI
          - Vue.js / Tailwind CSS
          - SQL / No-SQL
          - Kubernetes, Ansible, and more

  howwework:
    section: howwework
    title: "How We Work"
    steps:
      - number: "01"
        title: "Understand"
        desc: "We take time to understand your problem before writing a line of code. Requirements, constraints, context — all of it."
      - number: "02"
        title: "Design"
        desc: "Architecture and approach agreed upfront. No surprises mid-build, no costly pivots."
      - number: "03"
        title: "Build"
        desc: "Clean, tested, documented code. Regular check-ins. No black box."
      - number: "04"
        title: "Handover"
        desc: "We document thoroughly and support you post-delivery. We don't disappear."

  about:
    title: "About Us"
    text: ""
    body: >
      Based in London, we are a specialist Python engineering consultancy. We partner with startups and growing organizations to solve complex technical challenges **without compromising on long-term maintainability**. We have a deep understanding of the software lifecycle, development velocity, and the true cost of technical debt. By delivering clean, tested, and well-documented code, we ensure your technical foundation is built for scale, giving you the confidence to focus on your business goals.
    section: about

  contact:
