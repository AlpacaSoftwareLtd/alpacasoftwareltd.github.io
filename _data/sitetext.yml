    text: "Great software,<br><em>best practices.</em>"
    subtitle: "We build clean, tested, maintainable software for startups and growing companies. Based in London."
    button: What we do
    buttonlink: "#services"

  services:
    title: "Services"
    text: ""
    section: services
    list:
      - title: "MVP"
        desc: >
          From your business idea to a deployed service. We design and build a first iteration with core functionality ready for user testing.
        icon: fas fa-rocket

      - title: "Web Applications"
        desc: >
          From mockups to full-fledged web applications. New features, migrations, or a ground-up build — we're comfortable with the full lifecycle.
        icon: far fa-window-maximize

      - title: "Automation"
        desc: >
          Automate business and development processes. Test suites, CI/CD pipelines, scheduled tasks, internal tooling — all of it.
        icon: fas fa-robot

  stack:
    section: stack
    title: "Engineering Practices"
    intro: "Ten years across tech, healthcare and finance."
    columns:
      - title: "Architecture"
        items:
          - Microservices
          - Real-time applications
          - Security-sensitive systems
      - title: "Technologies"
        items:
          - Linux systems
          - Python for backend
          - Vue.js for frontend
          - SQL-based databases
          - Google Cloud
          - Networking protocols
      - title: "Assurance"
        items:
          - Test practices (TDD, BDD)
          - End-to-end testing
          - Continuous delivery (CI/CD)
          - Documentation

  howwework:
    section: howwework
    title: "How We Work"
    steps:
      - number: "01"
        title: "Understand"
        desc: "We take time to understand your problem before writing a line of code. Requirements, constraints, context — all of it."
      - number: "02"
        title: "Design"
        desc: "Architecture and approach agreed upfront. No surprises mid-build, no costly pivots."
      - number: "03"
        title: "Build"
        desc: "Clean, tested, documented code. Regular check-ins. No black box."
      - number: "04"
        title: "Handover"
        desc: "We document thoroughly and support you post-delivery. We don't disappear."

  about:
    title: "About Us"
    text: ""
    body: >
      We're a singleton Python house with our base in London. Our aim is helping startups and other organizations to solve
      various technical challenges **without sacrificing code quality and maintainability**. We have a deep understanding of the software lifecycle, velocity and technical debt. So we aim at delivering well-documented clean code that is tested and utilizes
      best industry practices. We want you to have the least headaches possible.
    section: about

