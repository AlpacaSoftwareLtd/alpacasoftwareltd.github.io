<!-- About -->
{% assign s = site.data.sitetext[site.locale].about %}
<section class="page-section" id="{{ s.section | default: 'about' }}">
  <div class="container">
    <span class="section-label">About</span>
    <h2 class="section-heading">{{ s.title | default: 'About Us' }}</h2>
    <div class="section-divider"></div>
    <div class="about-body">
      {{ s.body | markdownify }}
    </div>
  </div>
</section>
