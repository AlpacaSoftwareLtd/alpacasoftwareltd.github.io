<head>
  {% if site.analytics.google %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "{{ site.analytics.google }}");
  </script>
  {% endif %}

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <!-- Bootstrap -->
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/enterprise.js?render=6LdfLkckAAAAAKDgp8HQrq3egHYPfoHX_p2HT-XV"></script>

  <!-- Font Awesome -->
  <link href="assets/css/all.min.css" rel="stylesheet" type="text/css">

  <!-- Fonts: Instrument Serif + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Custom styles -->
  <link href="assets/css/agency.css" rel="stylesheet">

  {% if page.layout == "page" %}
  <style>
    #pagecontainer { padding-top: 150px; }
    @media only screen and (max-width: 991px) {
      #pagecontainer { padding-top: 100px; }
    }
  </style>
  {% endif %}
</head>
