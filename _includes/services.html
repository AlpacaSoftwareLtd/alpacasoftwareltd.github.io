<!-- Services -->
{% assign s = site.data.sitetext[site.locale].services %}
<section class="page-section" id="{{ s.section | default: 'services' }}">
  <div class="container">
    <span class="section-label">Services</span>
    <h2 class="section-heading">{{ s.title | default: 'What we do' }}</h2>
    <div class="section-divider"></div>
    <div class="services-grid">
      {% for item in s.list %}
      <div class="service-item">
        <span class="service-number">0{{ forloop.index }}</span>
        <h3>{{ item.title }}</h3>
        <p>{{ item.desc }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
