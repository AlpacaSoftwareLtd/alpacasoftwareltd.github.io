<!-- Contact -->
{% assign s = site.data.sitetext[site.locale].contact %}
<section class="page-section" id="{{ s.section | default: 'contact' }}">
  <div class="container">
    <span class="section-label">Get In Touch</span>
    <h2 class="section-heading">{{ s.title | default: 'Contact Us' }}</h2>
    <div class="section-divider"></div>
    <p class="contact-intro">{{ s.text | default: "Have a project in mind? Drop us a line." }}</p>
    <a id="contact-btn" class="btn btn-primary btn-xl" href="#">Send an Email</a>
    <!-- Email obfuscation: address is assembled at runtime to avoid plain-text
         exposure in source, which bots scrape for spam. -->
    <script>
      (function() {
        var u = 'alpacasoftwareltd', d = 'gmail.com';
        document.getElementById('contact-btn').href = 'mailto:' + u + '@' + d;
      })();
    </script>
  </div>
</section>
