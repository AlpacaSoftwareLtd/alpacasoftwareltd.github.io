<!-- Contact -->
{% assign s = site.data.sitetext[site.locale].contact %}
<section class="page-section" id="{{ s.section | default: 'contact' }}">
  <div class="container">
    <span class="section-label">Get In Touch</span>
    <h2 class="section-heading">{{ s.title | default: 'Contact Us' }}</h2>
    <div class="section-divider"></div>
    <div class="row">
      <div class="col-lg-8">
        <form id="contactForm" action="{{ site.form_post_url }}" novalidate="novalidate" method="POST">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <input name="name" class="form-control" id="name" type="text"
                  placeholder="{{ s.name | default: 'Name*' }}"
                  required="required"
                  data-validation-required-message="{{ s['name-validation'] | default: 'Please enter your name.' }}">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group">
                <input name="_replyto" class="form-control" id="email" type="email"
                  placeholder="{{ s.email | default: 'Email*' }}"
                  required="required"
                  data-validation-required-message="{{ s['email-validation'] | default: 'Please enter your email address.' }}">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group">
                <input name="phone" class="form-control" id="phone" type="tel"
                  placeholder="{{ s.phone | default: 'Phone Number' }}"
                  data-validation-required-message="{{ s['phone-validation'] | default: 'Please enter your phone number.' }}">
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <textarea name="message" class="form-control" id="message"
                  placeholder="{{ s.message | default: 'Message*' }}"
                  required="required"
                  data-validation-required-message="{{ s['message-validation'] | default: 'Please enter a message.' }}"></textarea>
                <p class="help-block text-danger"></p>
              </div>
            </div>
          </div>
          <input type="hidden" name="_subject" id="email-subject" value="{{ s.subject | default: 'Contact Form Submission' }}">
          <div class="clearfix"></div>
          <div id="success"></div>
          <button id="sendMessageButton" class="btn btn-primary btn-xl" type="submit">
            {{ s.submit | default: 'Send Message' }}
          </button>
          <input type="text" name="_gotcha" style="display:none">
          <input type="hidden" name="_next" value="#" />
          <input type="hidden" id="captchaResponse" name="g-recaptcha-response">
        </form>
        <script>
          grecaptcha.enterprise.ready(function() {
            grecaptcha.enterprise.execute('6LdfLkckAAAAAKDgp8HQrq3egHYPfoHX_p2HT-XV', {action: 'login'}).then(function(token) {
              document.getElementById('captchaResponse').value = token;
            });
          });
        </script>
      </div>
    </div>
  </div>
</section>
