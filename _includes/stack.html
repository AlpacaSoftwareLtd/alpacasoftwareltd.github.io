<!-- Stack -->
{% assign s = site.data.sitetext[site.locale].stack %}
<section class="page-section" id="{{ s.section | default: 'stack' }}">
  <div class="container">
    <span class="section-label">Practices</span>
    <h2 class="section-heading">{{ s.title | default: 'Our Stack' }}</h2>
    <div class="section-divider"></div>
    {% if s.intro %}
    <p class="stack-intro">{{ s.intro }}</p>
    {% endif %}
    <div class="stack-grid">
      {% for col in s.columns %}
      <div class="stack-col">
        <h4>{{ col.title }}</h4>
        <ul>
          {% for item in col.items %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
